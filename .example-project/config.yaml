# MCPAgent configuration
# All Azure OpenAI settings are read from .env (see .env.example)
# Values here serve as fallbacks if env vars are not set.

models:
  default:
    provider: azure

  # NVIDIA NIM (self-hosted or build.nvidia.com hosted API)
  # Uncomment and set NVIDIA_API_KEY in .env to use
  # nvidia-kimi:
  #   provider: nvidia
  #   endpoint: https://integrate.api.nvidia.com/v1   # hosted API
  #   # endpoint: http://localhost:8000/v1            # self-hosted NIM
  #   model_name: moonshotai/kimi-k2.5
  #   max_tokens: 8192

default_model: default
default_agent: architect          # agent preset to activate on startup (must match name in agents/*.md)

agent:
  max_iterations: 30
  # Context window management
  context_window: 128000       # model's context window in tokens
  summarize_threshold: 0.7     # auto-summarize at 70% of context window
  max_tool_result_tokens: 8000 # truncate tool results beyond this
  summary_max_tokens: 1000     # max tokens for the summary

storage:
  data_dir: ""      # all data stored here: memories, chat history, logs
  chat_history: true           # save conversation history to data_dir/history/
  logs: true                   # save execution logs to data_dir/logs/

skills_dir: "skills"
agents_dir: "agents"
workflows_dir: "workflows"
