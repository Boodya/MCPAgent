# MCPAgent configuration
# All Azure OpenAI settings are read from .env (see .env.example)
# Values here serve as fallbacks if env vars are not set.

models:
  azure-gpt-5.4:
    provider: azure
    endpoint: ""
    api_key: ""    # or set directly (not recommended for secrets)
    deployment: "gpt-5.4"
    api_version: "2025-04-01-preview"

  azure-gpt-5.2:
    provider: azure
    endpoint: ""
    api_key: ""    # or set directly (not recommended for secrets)
    deployment: "gpt-5.2"
    api_version: "2025-04-01-preview"
    
  nvidia-kimi:
    provider: nvidia
    endpoint: https://integrate.api.nvidia.com/v1
    model_name: moonshotai/kimi-k2.5
    api_key: ""    # or set directly (not recommended for secrets)
    max_tokens: 8192

  ollama-local:
    provider: ollama
    # endpoint defaults to http://localhost:11434/v1 — override if Ollama runs elsewhere
    # endpoint: http://localhost:11434/v1
    model_name: gemma3:12b     # any model you have pulled locally (ollama pull qwen3:8b)
    max_tokens: 8192
    # No api_key required for Ollama

    
default_model: nvidia-kimi      # azure-gpt-5.4
default_agent: default          # agent preset to activate on startup (must match name in agents/*.md)

agent:
  max_iterations: 30
  # Context window management
  context_window: 128000       # model's context window in tokens
  summarize_threshold: 0.7     # auto-summarize at 70% of context window
  max_tool_result_tokens: 8000 # truncate tool results beyond this
  summary_max_tokens: 1000     # max tokens for the summary

storage:
  data_dir: ""      # all data stored here: memories, chat history, logs
  chat_history: true           # save conversation history to data_dir/history/
  logs: true                   # save execution logs to data_dir/logs/

skills_dir: "skills"
agents_dir: "agents"
workflows_dir: "workflows"
