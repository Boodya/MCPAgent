name: example-research
description: "Example workflow — web research with analysis and bilingual summary"
# schedule: "0 9 * * *"   # uncomment to run daily at 09:00 UTC
enabled: false              # set to true when ready

vars:
  topic: "AI agents frameworks 2026"
  output_dir: "reports"

steps:
  - id: gather
    agent: web-researcher
    prompt: "Search the web and gather the latest news and developments on: {{vars.topic}}"
    timeout: 300

  - id: analyze
    agent: default
    prompt: |
      Analyze the following research results and identify key trends,
      notable projects, and major developments:

      {{steps.gather.result}}
    depends_on: [gather]

  - id: summary-ru
    agent: default
    prompt: |
      Write a concise executive summary IN RUSSIAN based on this analysis:
      {{steps.analyze.result}}
    depends_on: [analyze]

  - id: summary-en
    agent: default
    prompt: |
      Write a concise executive summary IN ENGLISH based on this analysis:
      {{steps.analyze.result}}
    depends_on: [analyze]

  - id: save-report
    agent: default
    prompt: |
      Create a file {{vars.output_dir}}/research-report.md with the following content:

      # Research Report: {{vars.topic}}

      ## English Summary
      {{steps.summary-en.result}}

      ## Резюме на русском
      {{steps.summary-ru.result}}
    depends_on: [summary-ru, summary-en]
